<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #111; color: #fff; text-align: center; padding: 24px; }
.container { max-width: 320px; }
.icon { font-size: 64px; margin-bottom: 24px; }
h1 { font-size: 22px; margin-bottom: 8px; }
p { color: #888; font-size: 14px; margin-bottom: 24px; }
button { background: #4F46E5; color: #fff; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
<div class="icon">⚠️</div>
<h1>Something Went Wrong</h1>
<p>The page could not be loaded.</p>
<button onclick="history.back()">Go Back</button>
</div>
</body>
</html>
