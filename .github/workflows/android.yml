name: Mobile Auto-Build (Final Fix)
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Start with a clean slate
      - name: Scrub Workspace
        run: |
          find . -maxdepth 1 ! -name 'project.zip' ! -name '.github' ! -name '.' -exec rm -rf {} +

      # 2. Extract and clear out local cache folders from the ZIP
      - name: Extract Project
        run: |
          unzip project.zip -d extracted_files
          cp -r extracted_files/*/* . || cp -r extracted_files/* . || true
          rm -rf build .gradle app/build

      # 3. Create a Modern Settings File (Crucial for Plugin Discovery)
      - name: Create Settings & Properties
        run: |
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "UltraCall-Vault"
          include ':app'
          EOF
          
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.nonTransitiveRClass=false" >> gradle.properties

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Downgrade from 9.4 to 8.5 (Fixes the Mutation Error)
      - name: Downgrade Gradle to 8.5
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      # 5. Build the APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-configuration-cache --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UltraCall-Vault-APK
          path: app/build/outputs/apk/debug/*.apk
