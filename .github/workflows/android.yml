name: Mobile Auto-Build (Final Fix)
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrub Workspace
        run: |
          find . -maxdepth 1 ! -name 'project.zip' ! -name '.github' ! -name '.' -exec rm -rf {} +

      - name: Extract and Organize
        run: |
          unzip project.zip -d extracted_files
          cp -r extracted_files/*/* . || cp -r extracted_files/* . || true
          
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        # The --no-configuration-cache flag is key to fixing your specific error
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-configuration-cache --stacktrace

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: UltraCall-Vault-Build
          path: app/build/outputs/apk/debug/*.apk
