name: Mobile Auto-Build (Plugin Fix)
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 1. Scrub Workspace
        run: |
          find . -maxdepth 1 ! -name 'project.zip' ! -name '.github' ! -name '.' -exec rm -rf {} +

      - name: 2. Extract and Organize
        run: |
          unzip project.zip -d extracted_files
          cp -r extracted_files/*/* . || cp -r extracted_files/* . || true
          rm -rf build .gradle app/build

      - name: 3. Create Plugin Management (Crucial for Gradle 9+)
        run: |
          # This tells Gradle to search Google's servers for the Android Plugin
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          include ':app'
          EOF

      - name: 4. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Build APK
        run: |
          # We'll use the system Gradle since the wrapper was missing
          gradle assembleDebug --no-configuration-cache --stacktrace

      - name: 6. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: UltraCall-Vault-Build
          path: app/build/outputs/apk/debug/*.apk
