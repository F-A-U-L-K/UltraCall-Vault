name: Mobile Auto-Build (Final Fix)
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 1. Scrub Workspace (Crucial)
        run: |
          # Delete everything except the ZIP so stale build files don't ruin the build
          find . -maxdepth 1 ! -name 'project.zip' ! -name '.github' ! -name '.' -exec rm -rf {} +

      - name: 2. Extract and Organize
        run: |
          unzip project.zip -d extracted_files
          cp -r extracted_files/*/* . || cp -r extracted_files/* . || true
          # Force delete any 'build' or '.gradle' folders that might have been in the ZIP
          rm -rf build .gradle app/build

      - name: 3. Create Missing Skeleton Files
        run: |
          # Create settings.gradle (Tells Gradle where the 'app' folder is)
          echo "include ':app'" > settings.gradle
          
          # Create gradle.properties (Fixes the Mutation Error for AGP 8.2)
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.nonTransitiveRClass=true" >> gradle.properties

      - name: 4. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # STEP 5: Run the Build (Modified for AGP 8.2.0 Mutation Error)
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-configuration-cache --no-configure-on-demand --stacktrace

      - name: 6. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: UltraCall-Vault-Build
          path: app/build/outputs/apk/debug/*.apk
