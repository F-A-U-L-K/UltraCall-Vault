name: Mobile Auto-Build (Version Sync)
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 1. Clean Workspace
        run: |
          find . -maxdepth 1 ! -name 'project.zip' ! -name '.github' ! -name '.' -exec rm -rf {} +

      - name: 2. Extract Project
        run: |
          unzip project.zip -d extracted_files
          cp -r extracted_files/*/* . || cp -r extracted_files/* . || true
          rm -rf build .gradle app/build

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Create Project Files
        run: |
          # Create a fresh settings file to avoid conflicts
          echo "include ':app'" > settings.gradle
          
          # Force AndroidX and disable the strict check causing the mutation error
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.nonTransitiveRClass=false" >> gradle.properties

      - name: 5. Force Gradle 8.5 (Critical Fix)
        run: |
          # This replaces the "System Gradle 9.4" with a version compatible with your code
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 6. Build APK
        run: |
          ./gradlew assembleDebug --no-configuration-cache --stacktrace

      - name: 7. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: UltraCall-Vault-APK
          path: app/build/outputs/apk/debug/*.apk
